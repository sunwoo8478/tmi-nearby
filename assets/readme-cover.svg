<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">TMI Nearby project cover</title>
  <desc id="desc">Dark glass mobile app cover for a nearby anonymous TMI and vote feed.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050507"/>
      <stop offset="0.52" stop-color="#0b0b10"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="limeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ccff00" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#ccff00" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <style>
      .sans { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    </style>
  </defs>

  <rect width="1280" height="520" rx="30" fill="url(#bg)"/>
  <circle cx="1040" cy="90" r="260" fill="#6259ff" opacity="0.16"/>
  <circle cx="260" cy="420" r="260" fill="url(#limeGlow)"/>
  <path d="M74 420C246 348 322 236 500 274C664 309 721 458 913 397C1035 358 1101 250 1206 230" fill="none" stroke="#ccff00" stroke-opacity="0.2" stroke-width="2"/>

  <g transform="translate(74 74)">
    <text class="mono" x="0" y="0" fill="#ccff00" font-size="15" font-weight="800" letter-spacing="2">LOCATION-BASED ANONYMOUS MICRO FEED</text>
    <text class="sans" x="0" y="82" fill="#ffffff" font-size="74" font-weight="900" letter-spacing="-5">TMI Nearby</text>
    <text class="sans" x="0" y="132" fill="#d8d8de" font-size="27" font-weight="700" letter-spacing="-1">반경 안의 짧은 TMI와 투표를 익명으로 넘겨보는 모바일 앱</text>
    <text class="sans" x="0" y="186" fill="#a1a1aa" font-size="18">dark glass · lime accent · card stack · nearby feed · anonymous identity</text>

    <g transform="translate(0 236)">
      <rect width="142" height="42" rx="21" fill="#ccff00"/>
      <text class="sans" x="26" y="27" fill="#08080a" font-size="15" font-weight="900">Feed Cards</text>
      <rect x="154" width="124" height="42" rx="21" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
      <text class="sans" x="183" y="27" fill="#ffffff" font-size="15" font-weight="800">Votes</text>
      <rect x="290" width="142" height="42" rx="21" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
      <text class="sans" x="323" y="27" fill="#ffffff" font-size="15" font-weight="800">Comments</text>
    </g>
  </g>

  <g transform="translate(862 54)" filter="url(#shadow)">
    <rect width="292" height="412" rx="42" fill="#08080a" stroke="rgba(255,255,255,0.12)"/>
    <rect x="100" y="12" width="92" height="27" rx="14" fill="#000"/>
    <text class="sans" x="32" y="78" fill="#ffffff" font-size="22" font-weight="900">TMI<tspan fill="#ccff00">.</tspan></text>
    <rect x="148" y="62" width="112" height="34" rx="17" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)"/>
    <circle cx="166" cy="79" r="4" fill="#ccff00"/>
    <text class="sans" x="178" y="84" fill="#d4d4d8" font-size="11" font-weight="700">반경 50m</text>

    <g transform="translate(24 122)">
      <rect width="244" height="240" rx="28" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.13)"/>
      <circle cx="36" cy="32" r="14" fill="#ccff00"/>
      <text class="sans" x="58" y="37" fill="#f4f4f5" font-size="12" font-weight="800">익명의 사과 · 4m</text>
      <text class="sans" x="24" y="116" fill="#ffffff" font-size="24" font-weight="900" letter-spacing="-1.4">
        <tspan x="24">앞에 앉은 분</tspan>
        <tspan x="24" dy="34">후드티 어디</tspan>
        <tspan x="24" dy="34">거예요?</tspan>
      </text>
      <rect x="24" y="192" width="76" height="30" rx="15" fill="rgba(255,255,255,0.08)"/>
      <text class="sans" x="42" y="212" fill="#d4d4d8" font-size="11" font-weight="800">댓글 2</text>
    </g>
    <circle cx="232" cy="356" r="27" fill="#ccff00"/>
    <text class="sans" x="223" y="365" fill="#08080a" font-size="26" font-weight="900">+</text>
  </g>
</svg>
